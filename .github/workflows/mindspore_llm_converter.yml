name: "Cloud Compile MindSpore Lite LLM (.ms)"

on:
  workflow_dispatch:
    inputs:
      model_id:
        description: '输入要转换的 HuggingFace/ModelScope 上的小型 ONNX/MindIR 模型直链 (如测试用例)'
        required: true
        # 默认这里填入一个小型测试 ONNX 的地址，实际使用中可以换成你自己的 Llama/Qwen ONNX 文件的云盘链接
        default: 'https://huggingface.co/Qwen/Qwen1.5-0.5B-Chat-GGUF/resolve/main/config.json' 
      quantize:
        description: '是否开启 W4A16 4-bit 权重极速量化 (推荐开启，大幅减小体积，适配鸿蒙端侧)'
        type: boolean
        default: true
      optimize:
        description: '硬件优化目标 (ascend_oriented 为 NPU 专属)'
        type: choice
        options:
          - ascend_oriented
          - general

jobs:
  build-and-quantize:
    runs-on: ubuntu-22.04
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Download MindSpore Lite Release (Linux x64)
        run: |
          echo "⬇️ Downloading Huawei MindSpore Lite 2.3.0..."
          wget https://ms-release.obs.cn-north-4.myhuaweicloud.com/2.3.0/MindSpore/lite/release/linux/x86_64/mindspore-lite-2.3.0-linux-x64.tar.gz -q
          tar -zxf mindspore-lite-2.3.0-linux-x64.tar.gz
          echo "MSLITE_PATH=$PWD/mindspore-lite-2.3.0-linux-x64" >> $GITHUB_ENV
          
      - name: 3. Prepare Model (Download Source Weight)
        run: |
          echo "⬇️ Downloading Original Model..."
          # 这里为了演示流水线成功跑通，我们生成一个 dummy 模拟模型。
          # 真实情况下：你需要把这里的 wget 换成你通过导出脚本 (MindFormers) 导出的 ONNX/MindIR 模型的直链。
          # wget -O source_model.onnx "${{ github.event.inputs.model_id }}"
          echo "Dummy weight data" > source_model.onnx
          
      - name: 4. Quantize & Compile (.ms) via converter_lite
        run: |
          # 设置运行库依赖
          export LD_LIBRARY_PATH=$MSLITE_PATH/tools/converter/lib:$LD_LIBRARY_PATH
          
          # 根据传入的参数决定是否开启 W4A16 量化
          if [ "${{ github.event.inputs.quantize }}" == "true" ]; then
            QUANT_FLAG="--commonQuantWeight=true --bitNum=4"
            echo "🚀 开启 4-bit 极速量化编译..."
          else
            QUANT_FLAG=""
            echo "⚙️  标准精度编译..."
          fi
          
          # 执行编译 (针对鸿蒙和 NPU)
          echo "⚙️  Running: converter_lite --fmk=ONNX --modelFile=source_model.onnx --outputFile=llm_model --optimize=${{ github.event.inputs.optimize }} $QUANT_FLAG"
          
          # 🚨 注意：由于上面的 source_model 是 dummy 的，这里直接跑真正的 converter_lite 会报错。
          # 真实环境中，把下面的 echo 替换为上一行的真实 converter_lite 命令即可！
          # $MSLITE_PATH/tools/converter/converter/converter_lite --fmk=ONNX --modelFile=source_model.onnx --outputFile=llm_model --optimize=${{ github.event.inputs.optimize }} $QUANT_FLAG
          
          # 模拟转换成功，生成 output
          touch llm_model.ms
          echo "✅ 编译完成！生成的端侧模型大小为: $(du -sh llm_model.ms)"

      - name: 5. Upload .ms Artifact for Download
        uses: actions/upload-artifact@v4
        with:
          name: mindspore-lite-llm-w4a16
          path: llm_model.ms
          retention-days: 7
