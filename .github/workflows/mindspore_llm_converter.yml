name: "Compile Qwen2.5-1.5B to MindSpore Lite (.ms)"

on:
  workflow_dispatch:
    inputs:
      hf_repo:
        description: 'HuggingFace ONNX 模型仓库 (默认使用 Qwen2.5-1.5B-Instruct)'
        required: true
        default: 'onnx-community/Qwen2.5-1.5B-Instruct'
      model_file:
        description: 'ONNX 文件路径 (相对于仓库根目录)'
        required: true
        default: 'onnx/model_fp16.onnx'
      quantize:
        description: '是否开启 W4A16 4-bit 量化 (开启以大幅减少内存占用)'
        type: boolean
        default: true

jobs:
  build-and-quantize:
    runs-on: ubuntu-22.04
    steps:
      - name: 1. Free Up Disk Space (Ubuntu runner)
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          df -h

      - name: 2. Download Huawei MindSpore Lite 2.3.0
        run: |
          echo "Downloading MindSpore Lite 2.3.0 for Linux-x64..."
          wget https://ms-release.obs.cn-north-4.myhuaweicloud.com/2.3.0/MindSpore/lite/release/linux/x86_64/mindspore-lite-2.3.0-linux-x64.tar.gz -q
          tar -zxf mindspore-lite-2.3.0-linux-x64.tar.gz
          echo "MSLITE_PATH=$PWD/mindspore-lite-2.3.0-linux-x64" >> $GITHUB_ENV

      - name: 3. Install HuggingFace CLI & Download Model
        run: |
          pip install -U "huggingface_hub[cli]"
          echo "Downloading ONNX model and tokenizer from ${{ github.event.inputs.hf_repo }}..."
          hf download ${{ github.event.inputs.hf_repo }} --include "onnx/model_fp16.*" --include "tokenizer*" --include "*.json" --local-dir ./hf_model
          ls -lh ./hf_model/onnx

      - name: 4. Quantize & Compile (.ms) via converter_lite
        run: |
          export LD_LIBRARY_PATH=$MSLITE_PATH/tools/converter/lib:$LD_LIBRARY_PATH
          
          if [ "${{ github.event.inputs.quantize }}" == "true" ]; then
            QUANT_FLAG="--commonQuantWeight=true --bitNum=4"
            echo "Running with W4A16 Quantization..."
          else
            QUANT_FLAG=""
            echo "Running with FP16 Standard Precision..."
          fi
          
          # 执行编译 (针对 OpenHarmony 端侧 NPU/GPU 优化)
          $MSLITE_PATH/tools/converter/converter/converter_lite \
            --fmk=ONNX \
            --modelFile=./hf_model/${{ github.event.inputs.model_file }} \
            --outputFile=qwen2.5_1.5b_instruct \
            --optimize=ascend_oriented \
            $QUANT_FLAG
          
          echo "Compilation finished. Checking size:"
          du -sh qwen2.5_1.5b_instruct.ms

      - name: 5. Prepare Artifacts
        run: |
          mkdir -p release_package
          mv qwen2.5_1.5b_instruct.ms release_package/
          cp ./hf_model/tokenizer* release_package/ || true
          cp ./hf_model/*.json release_package/ || true
          
      - name: 6. Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: qwen2.5-1.5b-mslite-w4a16
          path: release_package/
          retention-days: 7
